<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="鸥波艺境 - 全部原创音乐作品集">
    <title>作品集 | 鸥波艺境</title>

    <!-- ==================== CSS 样式引入 ==================== -->
    <link rel="stylesheet" href="../style/variables.css">
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/layout.css">
    <link rel="stylesheet" href="../style/components.css">
    <link rel="stylesheet" href="../style/works.css">
</head>
<body>

    <!-- 跳过导航链接（无障碍：允许键盘用户快速跳到主内容区） -->
    <a href="#main-content" class="skip-nav">跳到主要内容</a>

    <!-- ==================== 页面头部 ==================== -->
    <header class="page-header">
        <!-- 返回首页按钮 -->
        <a href="../" class="back-btn" aria-label="返回首页">
            <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M15.41 16.09L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" fill="currentColor"/>
            </svg>
        </a>
        <div class="page-header__title-group">
            <h1 class="page-header__title">作品集</h1>
            <span class="page-header__brand">鸥波艺境</span>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main id="main-content" class="page-main">

        <!-- 搜索区域 -->
        <div class="works-search" role="search">
            <div class="search">
                <!-- 搜索图标 (SVG) -->
                <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <!-- 搜索输入框 -->
                <input
                    type="text"
                    id="works-search-input"
                    class="search__input"
                    placeholder="搜索作品"
                    aria-label="搜索作品"
                    autocomplete="off"
                >
            </div>
        </div>

        <!-- 作品网格容器 -->
        <div id="works-grid" class="works-grid" aria-live="polite">
            <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 分页容器 -->
        <div id="works-pagination" class="container" role="navigation" aria-label="作品分页导航"></div>

    </main>

    <!-- ==================== 页脚 ==================== -->
    <footer class="page-footer">
        <p>
            &copy; 2025 鸥波艺境
            <span class="page-footer__divider" aria-hidden="true">|</span>
            探索艺术的无限可能
        </p>
    </footer>

    <!-- ==================== JavaScript 引入 ==================== -->
    <script src="../script/config.js"></script>
    <script src="../script/utils.js"></script>
    <script src="../script/data-loader.js"></script>
    <script src="../script/components.js"></script>
    <script src="../script/works.js"></script>

</body>
</html>
